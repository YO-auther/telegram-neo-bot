<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Шоу Нео — Абсолютный Хаос</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="stage">
            <div class="robot-face">
                <div class="robot-eye left"></div>
                <div class="robot-eye right"></div>
                <div class="robot-mouth"></div>
            </div>
            <div class="speech-bubble">
                <p id="show-text">ДАМЫ И ГОСПОДА! Сегодня на нашей сцене — ВЫ! Ваши нервы! И моё обаяние! 👏🤖</p>
            </div>
            <div class="actions-panel" id="actions-panel">
                <!-- Кнопки действий будут здесь -->
            </div>
        </div>
        <div class="footer">
            <p>🤖✨ Нео, версия 2.7 | Шоу продолжается, пока вы не закроете окно</p>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
